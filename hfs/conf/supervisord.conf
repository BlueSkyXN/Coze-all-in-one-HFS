[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/data/coze/run/supervisord.pid
childlogdir=/data/coze/logs

[program:mariadb]
priority=10
directory=/app
command=/opt/coze-hfs/bin/run-mariadb.sh
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:redis]
priority=20
command=/usr/bin/redis-server /opt/coze-hfs/conf/redis.conf
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nats]
priority=30
command=/usr/bin/nats-server -c /opt/coze-hfs/conf/nats-server.conf
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:minio]
priority=35
command=/opt/coze-hfs/bin/run-minio.sh
autostart=true
autorestart=false
startsecs=1
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:minio-init]
priority=36
command=/opt/coze-hfs/bin/init-minio.sh
autostart=true
autorestart=false
startsecs=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:coze-server]
priority=50
directory=/app
command=/opt/coze-hfs/bin/run-coze-server.sh
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:ops-service]
priority=55
directory=/app
command=/opt/coze-hfs/bin/run-ops-service.sh
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:nginx]
priority=60
command=/usr/sbin/nginx -c /opt/coze-hfs/conf/nginx.conf -g 'daemon off;'
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
