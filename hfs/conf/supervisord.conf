[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/data/coze/run/supervisord.pid
childlogdir=/data/coze/logs

[unix_http_server]
file=/data/coze/run/supervisor.sock
chmod=0700
chown=cozeadmin:cozeadmin

[supervisorctl]
serverurl=unix:///data/coze/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:mariadb]
priority=10
directory=/app
command=/opt/coze-hfs/bin/run-mariadb.sh
user=user
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/data/coze/logs/mariadb.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=2
stderr_logfile=/data/coze/logs/mariadb.err
stderr_logfile_maxbytes=20MB
stderr_logfile_backups=2

[program:redis]
priority=20
command=/usr/bin/redis-server /opt/coze-hfs/conf/redis.conf
user=user
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/data/coze/logs/redis.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=2
stderr_logfile=/data/coze/logs/redis.err
stderr_logfile_maxbytes=20MB
stderr_logfile_backups=2

