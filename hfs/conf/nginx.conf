worker_processes auto;
pid /data/coze/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_max_body_size 1024m;
    sendfile on;
    keepalive_timeout 65;

    proxy_temp_path /data/coze/nginx/proxy_temp;
    client_body_temp_path /data/coze/nginx/client_body_temp;
    fastcgi_temp_path /data/coze/nginx/fastcgi_temp;
    uwsgi_temp_path /data/coze/nginx/uwsgi_temp;
    scgi_temp_path /data/coze/nginx/scgi_temp;

    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    server {
        listen 7860;
        server_name _;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location = /_ops {
            add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors https://huggingface.co https://*.hf.space" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            return 308 /_ops/$is_args$args;
        }

        location /_ops/ {
            add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors https://huggingface.co https://*.hf.space" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            proxy_pass http://127.0.0.1:8081/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Uri $uri;
            proxy_set_header X-Forwarded-Method $request_method;
        }

        location = /_admin {
            add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors https://huggingface.co https://*.hf.space" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            return 308 /_admin/$is_args$args;
        }

        location /_admin/ {
            add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src data:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors https://huggingface.co https://*.hf.space" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            proxy_pass http://127.0.0.1:8082/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Uri $uri;
            proxy_set_header X-Forwarded-Method $request_method;
        }

        # Coze v0.5.1's built-in admin middleware is fail-open when no admin
        # email is persisted. Keep those upstream routes closed until a
        # matching server/web release contains the upstream fail-closed fix.
        location = /admin {
            return 404;
        }

        location ^~ /admin/ {
            return 404;
        }

        location = /api/admin {
            return 404;
        }

        location ^~ /api/admin/ {
            return 404;
        }

        location / {
            root /opt/coze-web;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
            etag on;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Content-Security-Policy "frame-ancestors https://huggingface.co https://*.hf.space" always;
        }

        location ~ ^/(api|v[1-3]|admin)(/|$) {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_verify off;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors https://huggingface.co https://*.hf.space" always;

            # The official Coze nginx config uses sub_filter for MinIO URL rewriting.
            # It is intentionally not enabled here because nginx's native sub module
            # is not guaranteed in every Alpine build. Prefer S3/TOS/ImageX for real uploads.
        }

        location /local_storage/ {
            if ($args ~* "(^|.*&)x-wf-file_name=[^&]*(&.*|$)") {
                set $args $1$2;
            }
            if ($args ~* "^x-wf-file_name=[^&]*$") {
                set $args "";
            }
            rewrite ^/local_storage/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host 127.0.0.1:9000;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
            proxy_read_timeout 600s;
        }
    }
}
