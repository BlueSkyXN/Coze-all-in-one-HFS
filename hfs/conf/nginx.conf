worker_processes auto;
pid /data/coze/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_max_body_size 1024m;
    sendfile on;
    keepalive_timeout 65;

    proxy_temp_path /data/coze/nginx/proxy_temp;
    client_body_temp_path /data/coze/nginx/client_body_temp;
    fastcgi_temp_path /data/coze/nginx/fastcgi_temp;
    uwsgi_temp_path /data/coze/nginx/uwsgi_temp;
    scgi_temp_path /data/coze/nginx/scgi_temp;

    server {
        listen 7860;
        server_name _;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location ~ ^/_ops/(healthz|readyz|status)$ {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /_ops/coze-health {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            root /opt/coze-web;
            try_files $uri $uri/ /index.html;
            index index.html index.htm;
            etag on;
            add_header Cache-Control "public, max-age=3600";
        }

        location ~ ^/(api|v[1-3]|admin)(/|$) {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_verify off;
            proxy_hide_header X-Frame-Options;
            add_header Content-Security-Policy "frame-ancestors https://huggingface.co https://*.hf.space" always;

            # The official Coze nginx config uses sub_filter for MinIO URL rewriting.
            # It is intentionally not enabled here because nginx's native sub module
            # is not guaranteed in every Alpine build. Prefer S3/TOS/ImageX for real uploads.
        }

        location /local_storage/ {
            if ($args ~* "(^|.*&)x-wf-file_name=[^&]*(&.*|$)") {
                set $args $1$2;
            }
            if ($args ~* "^x-wf-file_name=[^&]*$") {
                set $args "";
            }
            rewrite ^/local_storage/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host 127.0.0.1:9000;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;
        }
    }
}
