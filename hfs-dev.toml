schema_version = 2
standard = "hfs-dev"
pattern = "A"
runtime_mode = "image-assembly"
space_root_mode = "repo-root"
hfs_dir = "."
public_port = 7860
canonical_health_endpoint = "/_ops/healthz"
release_pin_required = true
dev_mutable_sources_allowed = []
required_files = [
  "README.md",
  "Dockerfile",
  "hfs-dev.toml",
  "hfs",
  "hfs/AGENTS.md",
  "hfs/bin/ops_service.py",
  "hfs/bin/admin_service.py",
  "hfs/bin/run-admin-service.sh",
  "docs",
  "docs/hfs-alignment.md",
  "docs/release-checklist.md",
  "scripts",
  "scripts/admin-smoke.sh",
  "scripts/validate-hfs-contract.sh",
  "AGENTS.md",
]

[[release_pins]]
name = "COZE_SERVER_TAG"
type = "image_tag"
source = "Dockerfile ARG"
current_dev_default = "0.5.1@sha256:bacce3aa5960a2f18362eac93317e42a8c0dbd125a44ec47519f12a8a27c7744"
required_for_release = true
dev_mutable_default_allowed = false
release_requires_digest = true
notes = "Used as cozedev/coze-studio-server:${COZE_SERVER_TAG}; keep aligned with COZE_WEB_TAG and COZE_GIT_REF."

