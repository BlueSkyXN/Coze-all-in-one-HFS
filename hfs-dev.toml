schema_version = 1
standard = "hfs-dev"
pattern = "A"
runtime_mode = "image-assembly"
space_root_mode = "repo-root"
hfs_dir = "."
public_port = 7860
canonical_health_endpoint = "/_ops/healthz"
release_pin_required = true
release_pin_surfaces = [
  "COZE_SERVER_TAG=<pinned Coze server image tag>",
  "COZE_WEB_TAG=<pinned Coze web image tag>",
  "COZE_GIT_REF=<matching coze-dev/coze-studio git tag or commit>",
  "ALPINE_VERSION=<pinned Alpine base image version>",
  "MinIO binary download URLs should be replaced by checksum-verified artifacts before a production release.",
]
dev_mutable_sources_allowed = []
required_files = [
  "README.md",
  "Dockerfile",
  "hfs-dev.toml",
  "hfs",
  "docs",
  "scripts",
  "AGENTS.md",
]
